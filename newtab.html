<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Tab Pet - 新分頁</title>
    <link rel="stylesheet" href="styles/newtab.css">
    <link rel="stylesheet" href="styles/pet.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 背景圖層 -->
        <div id="background-layer"></div>

        <!-- 主內容區 -->
        <main>
            <div id="clock-container">
                <h1 id="time">00:00</h1>
                <p id="date">2026年5月13日 星期三</p>
                <p id="pet-count"><span id="pet-count-number">0</span> 隻寵物在逛街</p>
            </div>

            <div id="pet-stage">
                <!-- 寵物將由此動態生成 -->
            </div>

            <div id="action-bar">
                <div class="summon-buttons">
                    <button id="random-summon-btn" class="action-btn">隨機召喚</button>
                    <button id="directed-summon-btn" class="action-btn action-btn-secondary">定向召喚 ▾</button>
                    <button id="clear-all-btn" class="action-btn action-btn-danger">清空全部</button>
                </div>
                <div id="directed-summon-panel" class="hidden">
                    <div class="pet-selector">
                        <button class="pet-option" data-type="cat1">英短貓</button>
                        <button class="pet-option" data-type="cat2">暹羅貓</button>
                        <button class="pet-option" data-type="cat3">緬因貓</button>
                        <button class="pet-option" data-type="dog1">柴犬</button>
                        <button class="pet-option" data-type="dog2">柯基</button>
                        <button class="pet-option" data-type="dog3">黃金獵犬</button>
                        <button class="pet-option" data-type="bird1">老鷹</button>
                        <button class="pet-option" data-type="bird2">貓頭鷹</button>
                        <button class="pet-option" data-type="bird3">鸚鵡</button>
                        <button class="pet-option" data-type="fish1">金魚</button>
                        <button class="pet-option" data-type="fish2">小丑魚</button>
                        <button class="pet-option" data-type="fish3">鬥魚</button>
                    </div>
                </div>
            </div>

            <div id="shortcuts">
                <!-- 快捷入口將由 JS 動態生成或預留 -->
            </div>
        </main>

        <!-- 設定面板按鈕 -->
        <button id="settings-toggle" aria-label="開啟設定">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.35 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.53,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.22,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.35 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.22,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.47,18.68 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" />
            </svg>
        </button>

        <!-- 設定面板 -->
        <div id="settings-panel" class="hidden">
            <h2>個人化設定</h2>
            <div class="setting-group">
                <label>寵物管理</label>
                <div id="pet-list-admin">
                    <!-- 由 JS 動態生成 -->
                </div>
            </div>
            <div class="setting-group">
                <label>背景主題</label>
                <div class="bg-selector">
                    <button class="bg-option active" data-bg="default">預設深色</button>
                    <button class="bg-option" data-bg="cozy-room">溫馨小屋</button>
                    <button class="bg-option" data-bg="pixel-forest">像素森林</button>
                </div>
            </div>
            <div class="setting-group">
                <label>快捷入口</label>
                <div id="shortcut-list-admin"></div>
                <div class="shortcut-add-form">
                    <input id="sc-name" placeholder="名稱" maxlength="12">
                    <input id="sc-url" placeholder="網址">
                    <input id="sc-icon" placeholder="圖示" maxlength="2">
                    <button id="sc-add-btn" class="shortcut-add-btn">新增</button>
                </div>
            </div>
            <button id="settings-close">關閉</button>
        </div>

        <!-- 開發用分層預覽（按 ` 切換） -->
        <div id="zone-overlay" style="display:none" aria-hidden="true">
            <div id="zone-air"    class="zone-band"><span></span></div>
            <div id="zone-ground" class="zone-band"><span></span></div>
            <div id="zone-water"  class="zone-band"><span></span></div>
            <div id="zone-hint">按 ` 隱藏</div>
        </div>

        <!-- 寵物小屋 -->
        <div id="pet-house">
            <div class="house-icon">🏠</div>
            <div class="house-label">寵物小屋</div>
        </div>
    </div>

    <script src="scripts/state.js"></script>
    <script src="scripts/pet-engine.js"></script>
    <script src="scripts/newtab.js"></script>
    <script>
    (function () {
        function updateOverlay() {
            const h  = window.innerHeight;
            const sz = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pet-size')) || 128;
            const groundLine = h * 0.65;
            const bands = {
                air:    { top: 20,              height: groundLine - sz - 30 - 20 },
                ground: { top: groundLine - sz,  height: sz },
                water:  { top: groundLine + 15,  height: Math.max(20, h - sz - 20 - (groundLine + 15)) }
            };
            const labels = {
                air:    `空中   20 – ${Math.round(groundLine - sz - 30)} px`,
                ground: `地面   ${Math.round(groundLine - sz)} – ${Math.round(groundLine)} px  (pet ${sz}px)`,
                water:  `水域   ${Math.round(groundLine + 15)} – ${Math.round(h - sz - 20)} px`
            };
            Object.keys(bands).forEach(k => {
                const el = document.getElementById('zone-' + k);
                el.style.top    = bands[k].top + 'px';
                el.style.height = bands[k].height + 'px';
                el.querySelector('span').textContent = labels[k];
            });
        }
        document.addEventListener('keydown', e => {
            if (e.key !== '`') return;
            const ov = document.getElementById('zone-overlay');
            const show = ov.style.display === 'none';
            ov.style.display = show ? 'block' : 'none';
            if (show) updateOverlay();
        });
        window.addEventListener('resize', () => {
            if (document.getElementById('zone-overlay').style.display !== 'none') updateOverlay();
        });
    })();
    </script>
</body>
</html>
